name: L2 Integration Tests for rdm-agent

on:
  pull_request:
    branches: [ develop ]

env:
  AUTOMATICS_UNAME: ${{ secrets.AUTOMATICS_UNAME }}
  AUTOMATICS_PASSCODE: ${{ secrets.AUTOMATICS_PASSCODE }}

jobs:
  execute-l2-tests-on-pr:
    name: Execute L2 Test in L2 Container Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rdm-agent Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out dependent repostiories
        uses: actions/checkout@v4
        with:
          repository: 'rdkcentral/remote_debugger'
          path: remote_debugger

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Pull Mock XConf, Native Platform, and Docker RDK CI Images
        run: |
          docker pull ghcr.io/rdkcentral/docker-device-mgt-service-test/mockxconf:latest
          docker pull ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
          docker pull ghcr.io/rdkcentral/docker-rdk-ci:latest

      - name: Start mock-xconf service with mTLS enabled
        run: |
          docker run -d --name mockxconf -p 50050:50050 -p 50051:50051 -p 50052:50052 -p 50056:50056 -e ENABLE_MTLS=true -v ${{ github.workspace }}:/mnt/L2_CONTAINER_SHARED_VOLUME ghcr.io/rdkcentral/docker-device-mgt-service-test/mockxconf:latest

      - name: Start l2-container service with mTLS enabled
        run: |
          docker run -d --name native-platform  --cap-add=SYS_ADMIN --security-opt seccomp=unconfined  --security-opt apparmor=unconfined --link mockxconf -e ENABLE_MTLS=true -v ${{ github.workspace }}:/mnt/L2_CONTAINER_SHARED_VOLUME ghcr.io/rdkcentral/docker-device-mgt-service-test/native-platform:latest
    
      - name: Copy RDKK-RRD-Test tar file from xconf to native platform
        run: |
          mkdir -p /tmp/cert7
          mkdir -p /tmp/cert2
          mkdir -p /tmp/RDK-RRD-Test
          docker cp mockxconf:/tmp/RDM/RDK-RRD-Test_1.0-signed.tar /tmp/
          docker cp mockxconf:/tmp/RDM/RDK-RRD-Test_1.0-signed.tar /tmp/cert7/
          docker cp mockxconf:/tmp/RDM/RDK-RRD-Test_1.0-signed.tar /tmp/cert2/
          docker cp mockxconf:/tmp/RDM/RDK-RRD-Test_1.0-signed.tar /tmp/RDK-RRD-Test/
          docker cp /tmp/RDK-RRD-Test_1.0-signed.tar native-platform:/mnt/
      
      - name: Extract signed tar
        run: |
          cd /tmp/cert7/
          tar -xvf RDK-RRD-Test_1.0-signed.tar
          cd /tmp/cert2/
          tar -xvf RDK-RRD-Test_1.0-signed.tar

      - name: Create rdm post-services script
        run: |
          cd /tmp/RDK-RRD-Test/
          tar -xvf RDK-RRD-Test_1.0-signed.tar
          tar -xvf RDK-RRD-Test_1.0.tar
          tar -xvf RDK-RRD-Test.tar
          mkdir -p etc/rdm/post-services/
          echo 'echo "executing scripts"' > etc/rdm/post-services/post_cadl.sh
          rm -rf RDK-RRD-Test.tar RDK-RRD-Test_1.0.tar RDK-RRD-Test_1.0-signed.tar
          tar -rvf RDK-RRD-Test.tar etc/rrd/remote_debugger.json etc/rdm/post-services/post_cadl.sh
          tar -cvf RDK-RRD-Test_1.0.tar package.json RDK-RRD-Test.tar
          tar -cvf RDK-RRD-Test_1.0-signed.tar RDK-RRD-Test_1.0.tar RDK-RRD-Test_1.0.sig pkg_padding pkg_cpemanifest
          docker cp RDK-RRD-Test_1.0-signed.tar mockxconf:/tmp/RDM/RDK-RRD-Test_1.0-signed.tar

      - name: Rename tar and signature
        run: |
          cd /tmp/cert7/
          mv RDK-RRD-Test_1.0.tar cert-test-bundle_0.7.tar
          mv RDK-RRD-Test_1.0.sig cert-test-bundle_0.7.sig
          cd /tmp/cert2/
          mv RDK-RRD-Test_1.0.tar cert-test-bundle_0.2.tar
          mv RDK-RRD-Test_1.0.sig cert-test-bundle_0.2.sig

      - name: Create ca-store-update signed tar
        run: |
          cd /tmp/cert7/
          tar -cvf cert-test-bundle_0.7-signed.tar cert-test-bundle_0.7.tar cert-test-bundle_0.7.sig pkg_padding  pkg_cpemanifest
          docker cp /tmp/cert7/cert-test-bundle_0.7-signed.tar mockxconf:/tmp/RDM/cert-test-bundle_0.7-signed.tar
          cd /tmp/cert2/
          tar -cvf cert-test-bundle_0.2-signed.tar cert-test-bundle_0.2.tar cert-test-bundle_0.2.sig pkg_padding  pkg_cpemanifest
          docker cp /tmp/cert2/cert-test-bundle_0.2-signed.tar mockxconf:/tmp/RDM/cert-test-bundle_0.2-signed.tar

      - name: Build remote_debugger
        run: |
          docker exec -i native-platform /bin/bash -c "cd /mnt/L2_CONTAINER_SHARED_VOLUME/remote_debugger && sh cov_build.sh && export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/lib/x86_64-linux-gnu:/lib/aarch64-linux-gnu:/usr/local/lib:"

      - name: Start rrd process inside Native Platform Container
        run: |
          docker exec -d native-platform /usr/local/bin/remotedebugger

      - name: Build rdm-agent and Run L2 inside Native Platform Container
        run: |
          docker exec -i native-platform /bin/bash -c "cd /mnt/L2_CONTAINER_SHARED_VOLUME/ && sh ./cov_build.sh && export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/lib/x86_64-linux-gnu:/lib/aarch64-linux-gnu:/usr/local/lib && sh run_l2.sh"
          
      - name: Copy L2 Test report to Host Runner
        run: |
          docker cp native-platform:/tmp/l2_test_report /tmp/L2_TEST_RESULTS
          ls -lh /tmp/L2_TEST_RESULTS

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v1
        with:
          install: true

      - name: Run RDK CI Container
        run: |
          docker run -d --name ci-container -e AUTOMATICS_UNAME=${{ secrets.AUTOMATICS_UNAME }} -e AUTOMATICS_PASSCODE=${{ secrets.AUTOMATICS_PASSCODE }} -v /tmp/L2_TEST_RESULTS:/tmp/L2_TEST_RESULTS ghcr.io/rdkcentral/docker-rdk-ci:latest tail -f /dev/null

      - name: Upload Results to Automatics
        if: github.repository_owner == 'rdkcentral'
        run: |
          docker cp /tmp/L2_TEST_RESULTS ci-container:/tmp/L2_TEST_RESULTS
          docker exec -i ci-container bash -c "echo 'Contents in workspace directory' && ls -l && echo '===============================' && echo 'Contents in /tmp/L2_TEST_RESULTS' && ls -l /tmp/L2_TEST_RESULTS && echo '===============================' && git config --global --add safe.directory /mnt/L2_CONTAINER_SHARED_VOLUME && gtest-json-result-push.py /tmp/L2_TEST_RESULTS https://rdkeorchestrationservice.apps.cloud.comcast.net/rdke_orchestration_api/push_unit_test_results /mnt/L2_CONTAINER_SHARED_VOLUME"
